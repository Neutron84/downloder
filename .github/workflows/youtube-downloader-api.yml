name: دانلود یوتیوب (بدون کوکی و با PO Token ابری)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      quality:
        description: 'کیفیت'
        required: false
        default: '1080p'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p
          - 720p
          - 480p
          - 360p
          - Audio Only

env:
  OUTPUT_DIR: youtube_downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: نصب yt-dlp و FFmpeg و ابزار PO Token
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade pip
          pip install yt-dlp
          pip install yt-dlp-get-pot

      - name: تنظیم فرمت بر اساس کیفیت
        id: format
        run: |
          case "${{ github.event.inputs.quality }}" in
            "2160p (4K)")
              echo "format=bestvideo[height<=2160][ext=mp4]+bestaudio[ext=m4a]/best[height<=2160]" >> $GITHUB_OUTPUT
              ;;
            "1440p (2K)")
              echo "format=bestvideo[height<=1440][ext=mp4]+bestaudio[ext=m4a]/best[height<=1440]" >> $GITHUB_OUTPUT
              ;;
            "1080p")
              echo "format=bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]" >> $GITHUB_OUTPUT
              ;;
            "720p")
              echo "format=bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" >> $GITHUB_OUTPUT
              ;;
            "480p")
              echo "format=bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]" >> $GITHUB_OUTPUT
              ;;
            "360p")
              echo "format=bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360]" >> $GITHUB_OUTPUT
              ;;
            "Audio Only")
              echo "format=bestaudio" >> $GITHUB_OUTPUT
              echo "audio=true" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: دانلود با yt-dlp-get-pot (استفاده از سرور ابری PO Token)
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cd ${{ env.OUTPUT_DIR }}
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ steps.format.outputs.format }}"
          IS_AUDIO="${{ steps.format.outputs.audio }}"

          # گزینه‌های پایه
          OPTS=(--no-cookies --no-cache-dir --extractor-retries 10 --fragment-retries 10 --output '%(title)s.%(ext)s')

          if [ "$IS_AUDIO" = "true" ]; then
            echo "🎵 در حال دانلود صدا..."
            yt-dlp-get-pot "${OPTS[@]}" -f "$FORMAT" --extract-audio --audio-format mp3 "$URL"
          else
            echo "🎬 در حال دانلود ویدیو..."
            yt-dlp-get-pot "${OPTS[@]}" -f "$FORMAT" --merge-output-format mp4 "$URL"
          fi

      - name: ارسال فایل به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.OUTPUT_DIR }}
          git diff --cached --quiet || git commit -m "افزودن ویدیوی دانلود شده با PO Token ابری"
          git push
