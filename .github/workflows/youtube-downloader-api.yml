name: دانلود ویدیو با API جدید (alexbic)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      quality:
        description: 'کیفیت'
        required: false
        default: '1080p'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p
          - 720p
          - 480p
          - Audio Only

env:
  OUTPUT_DIR: downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: نصب ابزارهای مورد نیاز
        run: sudo apt-get update && sudo apt-get install -y jq curl

      # =================================================
      # استقرار API قدرتمند جدید
      # =================================================
      - name: اجرای YouTube Downloader API با Docker
        run: |
          docker run -d --name youtube-api -p 5000:5000 alexbic/youtube-downloader-api:latest
          echo "در انتظار راه‌اندازی API..."
          for i in {1..15}; do
            if curl -s http://localhost:5000/health | grep -q "healthy"; then
              echo "✅ API با موفقیت راه‌اندازی شد."
              break
            fi
            sleep 3
          done
      # =================================================

      - name: ساخت درخواست نهایی (JSON)
        id: prepare
        run: |
          QUALITY_INPUT="${{ github.event.inputs.quality }}"
          if [[ "$QUALITY_INPUT" == "Audio Only" ]]; then
            DOWNLOAD_MODE="audio"
            FORMAT="mp3"
            PAYLOAD=$(jq -c -n \
              --arg url "${{ github.event.inputs.video_url }}" \
              --arg dm "$DOWNLOAD_MODE" \
              --arg af "$FORMAT" \
              '{url: $url, download_mode: $dm, audio_format: $af}')
          else
            QUALITY_NUM=$(echo "$QUALITY_INPUT" | grep -oE '[0-9]+')
            if [[ -z "$QUALITY_NUM" ]]; then QUALITY_NUM="1080"; fi
            PAYLOAD=$(jq -c -n \
              --arg url "${{ github.event.inputs.video_url }}" \
              --arg vq "$QUALITY_NUM" \
              '{url: $url, video_quality: $vq}')
          fi
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT
          echo "Request payload: $PAYLOAD"

      - name: فراخوانی API و دریافت لینک دانلود
        id: api
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:5000/download_video \
            -H "Content-Type: application/json" \
            -d '${{ steps.prepare.outputs.payload }}')
          
          echo "پاسخ API: $RESPONSE"
          
          if [[ -z "$RESPONSE" || "$RESPONSE" == "null" ]]; then
            echo "::error::خطا در پردازش درخواست توسط API"
            exit 1
          fi

          # تلاش برای استخراج لینک دانلود (بر اساس پاسخ API)
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url // .url // .result')
          if [[ -z "$DOWNLOAD_URL" || "$DOWNLOAD_URL" == "null" ]]; then
            echo "::error::خطا: امکان دریافت لینک دانلود وجود ندارد. پاسخ API: $RESPONSE"
            exit 1
          fi

          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "لینک دانلود مستقیم دریافت شد."

      - name: دریافت فایل نهایی
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cd "${{ env.OUTPUT_DIR }}"
          echo "در حال دانلود فایل..."
          curl -L -J -O "${{ steps.api.outputs.download_url }}"
          echo "دانلود انجام شد. فایل‌های موجود:"
          ls -lh

      - name: پاک‌سازی و ارسال به مخزن
        if: always()
        run: |
          docker stop youtube-api || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.OUTPUT_DIR }}"
          git diff --cached --quiet || git commit -m "افزودن ویدیوی دانلود شده با alexbic/youtube-downloader-api"
          git push
