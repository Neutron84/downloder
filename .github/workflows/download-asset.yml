name: Fetch AUR Package and Zip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Clone AUR package (uabea)
        run: |
          git clone --depth 1 https://aur.archlinux.org/uabea.git aur_uabea_temp

      - name: Create ZIP archive
        run: |
          rm -f uabea-aur.zip
          cd aur_uabea_temp
          zip -r ../uabea-aur.zip . -x ".git/*"
          cd ..

      - name: Commit and push the ZIP file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uabea-aur.zip
          git diff --cached --quiet || git commit -m "Update uabea AUR package zip"
          git push