name: Fetch AUR Package and Zip


on:
  workflow_dispatch: 
    inputs:
      url:
        description: 'URL'
        required: true
      filename:
        description: 'Output filename'
        required: false
        default: file1
permissions:
  contents: write

jobs:
  fetch-and-zip:
    runs-on: Clone AUR package latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Clone AUR package
        run: |
          git clone --depth 1 ${{ github.event.inputs.url }} aur_${{ github.event.inputs.filename }}_temp

      - name: Create ZIP archive
        run: |
          rm -f ${{ github.event.inputs.filename }}-aur.zip
          cd aur_${{ github.event.inputs.filename }}_temp
          zip -r ../${{ github.event.inputs.filename }}-aur.zip . -x ".git/*"
          cd ..

      - name: Commit and push the ZIP file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ github.event.inputs.filename }}-aur.zip 
          git diff --cached --quiet || git commit -m "Update ${{ github.event.inputs.filename }} AUR package zip"
          git push
