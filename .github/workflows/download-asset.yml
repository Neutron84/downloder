name: Download AssetRipper Linux ZIP

on:
  workflow_dispatch: 

permissions:
  contents: write    

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download AssetRipper_linux_x64.zip
        run: |
          curl -L -o AssetRipper_linux_x64.zip \
          https://github.com/AssetRipper/AssetRipper/releases/download/1.3.14/AssetRipper_linux_x64.zip

      - name: Commit and push if file changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add AssetRipper_linux_x64.zip
          git diff --cached --quiet || git commit -m "Download AssetRipper_linux_x64.zip v1.3.14"
          git push