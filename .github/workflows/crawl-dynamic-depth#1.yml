name: Crawl Dynamic Website with Depth and Scroll (Fixed)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Starting URL'
        required: true
        type: string
      crawl_depth:
        description: 'Crawl depth (1 = only start page, 2 = start + linked pages, etc.)'
        required: false
        default: '1'
        type: string
      scroll_limit:
        description: 'Number of scrolls per page (for infinite scroll)'
        required: false
        default: '10'
        type: string
      scroll_pause_ms:
        description: 'Pause between scrolls (milliseconds)'
        required: false
        default: '2000'
        type: string
      wait_for_selector:
        description: 'CSS selector to wait for before scrolling (optional)'
        required: false
        default: ''
        type: string
      output_dir:
        description: 'Output directory (must end with /) e.g., output/'
        required: true
        type: string
      cookies_file:
        description: 'Path to cookies file (Netscape .txt or JSON) inside repo'
        required: false
        default: ''
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate output directory
        run: |
          if [[ ! "${{ github.event.inputs.output_dir }}" =~ /$ ]]; then
            echo "::error::Output directory must end with /"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer, cheerio and system dependencies
        run: |
          npm install puppeteer cheerio
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev libxshmfence-dev libnss3 libatk-bridge2.0-0 \
            libdrm2 libxkbcommon0 libgbm1 libasound2 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libxtst6

      - name: Create output directory
        run: mkdir -p "${{ github.event.inputs.output_dir }}"

      - name: Run Puppeteer depth crawler
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          CRAWL_DEPTH: ${{ github.event.inputs.crawl_depth }}
          SCROLL_LIMIT: ${{ github.event.inputs.scroll_limit }}
          SCROLL_PAUSE_MS: ${{ github.event.inputs.scroll_pause_ms }}
          WAIT_SELECTOR: ${{ github.event.inputs.wait_for_selector }}
          OUTPUT_DIR: ${{ github.event.inputs.output_dir }}
          COOKIES_FILE: ${{ github.event.inputs.cookies_file }}
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          const cheerio = require('cheerio');
          const fs = require('fs').promises;
          const path = require('path');
          const { exec } = require('child_process');
          const { promisify } = require('util');
          const crypto = require('crypto');
          const execPromise = promisify(exec);

          (async () => {
            const startUrl = process.env.TARGET_URL;
            const maxDepth = parseInt(process.env.CRAWL_DEPTH, 10) || 1;
            const scrollLimit = parseInt(process.env.SCROLL_LIMIT, 10) || 10;
            const scrollPauseMs = parseInt(process.env.SCROLL_PAUSE_MS, 10) || 2000;
            const waitSelector = process.env.WAIT_SELECTOR || '';
            const outDir = process.env.OUTPUT_DIR;
            const cookiesFilePath = process.env.COOKIES_FILE;

            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const resourceMap = new Map(); // absoluteUrl -> {body, contentType}
            let pendingResources = [];

            function captureResource(url, contentType, bufferPromise) {
              const p = bufferPromise.then(buffer => {
                resourceMap.set(url, { body: buffer, contentType });
                return true;
              }).catch(err => console.warn(`Failed to capture ${url}: ${err.message}`));
              pendingResources.push(p);
              return p;
            }

            const visited = new Set();
            const queue = [{ url: startUrl, depth: 0 }];
            const pageMap = new Map(); // finalUrl -> localHtmlFile
            const urlToLocalPage = new Map();

            async function processPage(pageUrl, currentDepth) {
              const page = await browser.newPage();
              await page.setRequestInterception(true);
              page.on('request', req => req.continue());

              page.on('response', async response => {
                const respUrl = response.url();
                const contentType = response.headers()['content-type'] || '';
                const ext = path.extname(new URL(respUrl).pathname).toLowerCase();
                const isHtml = contentType.includes('text/html') || ext === '.html' || ext === '.htm';
                if (!isHtml) {
                  captureResource(respUrl, contentType, response.buffer());
                }
              });

              if (cookiesFilePath && cookiesFilePath.trim() !== '') {
                try {
                  const cookiesContent = await fs.readFile(cookiesFilePath, 'utf8');
                  let cookies;
                  if (cookiesFilePath.endsWith('.json')) {
                    cookies = JSON.parse(cookiesContent);
                  } else {
                    cookies = cookiesContent.split('\n')
                      .filter(line => line.trim() && !line.startsWith('#'))
                      .map(line => {
                        const parts = line.split(/\s+/);
                        return {
                          name: parts[5],
                          value: parts[6],
                          domain: parts[0],
                          path: parts[2],
                          expires: parseInt(parts[4], 10),
                          httpOnly: parts[3].includes('HttpOnly'),
                          secure: parts[3].includes('Secure')
                        };
                      });
                  }
                  await page.setCookie(...cookies);
                } catch (err) {
                  console.warn('Cookie error:', err.message);
                }
              }

              await page.goto(pageUrl, { waitUntil: 'networkidle2', timeout: 60000 });
              const finalUrl = page.url();

              if (visited.has(finalUrl)) {
                await page.close();
                return null;
              }
              visited.add(finalUrl);
              console.log(`[${currentDepth}] Processing final URL: ${finalUrl}`);

              if (waitSelector) {
                await page.waitForSelector(waitSelector, { timeout: 10000 }).catch(() => {});
              }

              let previousHeight = await page.evaluate('document.body.scrollHeight');
              for (let i = 0; i < scrollLimit; i++) {
                await page.evaluate('window.scrollTo(0, document.body.scrollHeight)');
                await page.waitForFunction(
                  `document.body.scrollHeight > ${previousHeight}`,
                  { timeout: 5000 }
                ).catch(() => console.log(`Scroll ${i+1}: no new content`));
                await new Promise(r => setTimeout(r, scrollPauseMs));
                const newHeight = await page.evaluate('document.body.scrollHeight');
                if (newHeight === previousHeight) break;
                previousHeight = newHeight;
              }

              await page.waitForNetworkIdle({ idleTime: 2000, timeout: 15000 }).catch(() => {});
              await Promise.all(pendingResources);
              pendingResources = [];
              await new Promise(r => setTimeout(r, 500));

              const html = await page.content();

              const links = await page.evaluate(() => {
                const anchors = Array.from(document.querySelectorAll('a[href]'));
                return anchors
                  .map(a => a.href)
                  .filter(href => href && !href.startsWith('mailto:') && !href.startsWith('javascript:') && !href.includes('#'));
              });

              await page.close();

              const urlHash = crypto.createHash('md5').update(finalUrl).digest('hex').slice(0, 12);
              const localFileName = `page_${urlHash}.html`;
              pageMap.set(finalUrl, localFileName);

              return { html, links, localFileName, finalUrl };
            }

            const pagesData = [];
            let idx = 0;
            while (idx < queue.length) {
              const { url: currentUrl, depth } = queue[idx];
              idx++;
              if (depth > maxDepth) continue;

              const result = await processPage(currentUrl, depth);
              if (result) {
                pagesData.push({
                  url: result.finalUrl,
                  html: result.html,
                  localFile: result.localFileName,
                  depth: depth,
                  links: result.links
                });
                if (depth < maxDepth) {
                  const baseDomain = new URL(startUrl).hostname;
                  for (const link of result.links) {
                    try {
                      const linkUrl = new URL(link);
                      if (linkUrl.hostname === baseDomain && !visited.has(linkUrl.href) && !queue.some(item => item.url === linkUrl.href)) {
                        queue.push({ url: linkUrl.href, depth: depth + 1 });
                      }
                    } catch (e) {}
                  }
                }
              }
            }

            const tempDir = path.join(outDir, 'temp_crawl_' + Date.now());
            const assetsDir = path.join(tempDir, 'assets');
            await fs.mkdir(assetsDir, { recursive: true });

            const urlToAssetPath = new Map();
            for (const [resUrl, data] of resourceMap.entries()) {
              let ext = '';
              const contentType = data.contentType;
              if (contentType.includes('css')) ext = '.css';
              else if (contentType.includes('javascript')) ext = '.js';
              else if (contentType.includes('image/png')) ext = '.png';
              else if (contentType.includes('image/jpeg')) ext = '.jpg';
              else if (contentType.includes('image/gif')) ext = '.gif';
              else if (contentType.includes('image/webp')) ext = '.webp';
              else if (contentType.includes('image/svg')) ext = '.svg';
              else if (contentType.includes('image/avif')) ext = '.avif';
              else if (contentType.includes('image/heic')) ext = '.heic';
              else if (contentType.includes('image/bmp')) ext = '.bmp';
              else if (contentType.includes('image/tiff')) ext = '.tiff';
              else if (contentType.includes('font/woff2')) ext = '.woff2';
              else if (contentType.includes('font/woff')) ext = '.woff';
              else {
                const parsed = new URL(resUrl);
                const parsedExt = path.extname(parsed.pathname);
                ext = parsedExt || '.bin';
              }
              const hash = crypto.createHash('md5').update(resUrl).digest('hex').slice(0, 12);
              const assetFileName = `${hash}${ext}`;
              const assetRelPath = path.join('assets', assetFileName);
              const fullAssetPath = path.join(tempDir, assetRelPath);
              await fs.writeFile(fullAssetPath, data.body);
              urlToAssetPath.set(resUrl, assetRelPath);
            }

            function resolveUrl(base, relative) {
              try {
                return new URL(relative, base).href;
              } catch (e) {
                return relative;
              }
            }

            for (const pageInfo of pagesData) {
              const $ = cheerio.load(pageInfo.html);
              const pageBase = pageInfo.url;

              const attributesToCheck = [
                { selector: 'img', attr: 'src' },
                { selector: 'img', attr: 'srcset' },
                { selector: 'link', attr: 'href' },
                { selector: 'script', attr: 'src' },
                { selector: 'video', attr: 'src' },
                { selector: 'source', attr: 'src' },
                { selector: 'source', attr: 'srcset' },
                { selector: 'audio', attr: 'src' },
                { selector: 'object', attr: 'data' },
                { selector: 'embed', attr: 'src' },
                { selector: 'iframe', attr: 'src' }
              ];

              for (const { selector, attr } of attributesToCheck) {
                $(selector).each((i, el) => {
                  let val = $(el).attr(attr);
                  if (val) {
                    const absolute = resolveUrl(pageBase, val);
                    if (urlToAssetPath.has(absolute)) {
                      $(el).attr(attr, urlToAssetPath.get(absolute));
                    } else if (urlToAssetPath.has(val)) {
                      $(el).attr(attr, urlToAssetPath.get(val));
                    }
                  }
                });
              }

              $('[style]').each((i, el) => {
                let style = $(el).attr('style');
                if (style) {
                  const urlMatches = style.match(/url\([\'"]?([^\'")]+)[\'"]?\)/g);
                  if (urlMatches) {
                    for (const match of urlMatches) {
                      const urlPart = match.replace(/url\([\'"]?/, '').replace(/[\'"]?\)/, '');
                      const absolute = resolveUrl(pageBase, urlPart);
                      if (urlToAssetPath.has(absolute)) {
                        const newMatch = `url("${urlToAssetPath.get(absolute)}")`;
                        style = style.replace(match, newMatch);
                      }
                    }
                    $(el).attr('style', style);
                  }
                }
              });

              for (const [targetUrl, targetLocalFile] of pageMap.entries()) {
                if (targetUrl !== pageInfo.url) {
                  $('a[href]').each((i, el) => {
                    let href = $(el).attr('href');
                    if (href) {
                      const absolute = resolveUrl(pageBase, href);
                      if (absolute === targetUrl) {
                        $(el).attr('href', targetLocalFile);
                      }
                    }
                  });
                }
              }

              const updatedHtml = $.html();
              const htmlFilePath = path.join(tempDir, pageInfo.localFile);
              await fs.writeFile(htmlFilePath, updatedHtml);
            }

            const startLocalFile = pageMap.get(startUrl);
            if (startLocalFile) {
              await fs.writeFile(path.join(tempDir, 'index.html'), `<meta http-equiv="refresh" content="0; url=${startLocalFile}">`);
            }

            const timestamp = new Date().toISOString().replace(/[-:]/g, '').slice(0, 15);
            const domain = new URL(startUrl).hostname;
            const archiveName = `${domain}_depth${maxDepth}_${timestamp}.tar.gz`;
            const archivePath = path.join(outDir, archiveName);
            await execPromise(`tar -czf "${archivePath}" -C "${tempDir}" .`);
            console.log(`Archive created: ${archivePath}`);

            await fs.rm(tempDir, { recursive: true, force: true });
            await browser.close();
          })();
          EOF

      - name: Commit and push output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${{ github.event.inputs.output_dir }}"
          git commit -m "Add depth crawl snapshot: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push