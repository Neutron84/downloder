name: YouTube Persian Ultra Fix (No Login Required)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: '1080p (FHD)'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p (FHD)
          - 720p (HD)
          - 480p (SD)
          - 360p
          - Audio Only (MP3)

env:
  OUTPUT_DIR: youtube

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Persian Dependency Fix - Install yt-dlp & FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade pip
          pip install "yt-dlp[default]"

      - name: Persian Core Fix - Bypass Botguard (PO Token Injection)
        run: |
          python3 -m pip install bgutil-ytdlp-pot-provider
          cd /tmp
          git clone https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
          cd bgutil-ytdlp-pot-provider/server
          npm install
          npx tsc
          node dist/index.js --port 4416 --detach &
          cd $GITHUB_WORKSPACE
          echo "::group::Persian Fix: PO Token Server Started"
          ps aux | grep node
          echo "::endgroup::"

      - name: Persian Format Selector
        id: format
        run: |
          case "${{ github.event.inputs.quality }}" in
            "2160p (4K)")
              echo "format=bestvideo[height<=2160][ext=mp4]+bestaudio[ext=m4a]/best[height<=2160]" >> $GITHUB_OUTPUT
              ;;
            "1440p (2K)")
              echo "format=bestvideo[height<=1440][ext=mp4]+bestaudio[ext=m4a]/best[height<=1440]" >> $GITHUB_OUTPUT
              ;;
            "1080p (FHD)")
              echo "format=bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]" >> $GITHUB_OUTPUT
              ;;
            "720p (HD)")
              echo "format=bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" >> $GITHUB_OUTPUT
              ;;
            "480p (SD)")
              echo "format=bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]" >> $GITHUB_OUTPUT
              ;;
            "360p")
              echo "format=bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360]" >> $GITHUB_OUTPUT
              ;;
            "Audio Only (MP3)")
              echo "format=bestaudio" >> $GITHUB_OUTPUT
              echo "audio=true" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Persian Download Engine (Ultimate)
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cd ${{ env.OUTPUT_DIR }}
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ steps.format.outputs.format }}"
          IS_AUDIO="${{ steps.format.outputs.audio }}"

          # Persian Kernel Optimization
          export YTDLP_POT_PROVIDER="http://localhost:4416"

          YT_OPTS="--extractor-args \"youtube:player_client=android,web\" \
                    --use-postprocessor \"GetPOT:provider=bgutil-ytdlp-pot-provider\" \
                    --extractor-retries 5 \
                    --fragment-retries 5 \
                    --sleep-interval 2 \
                    --max-sleep-interval 5 \
                    --limit-rate 10M \
                    --add-metadata \
                    --embed-thumbnail \
                    --embed-chapters \
                    --output \"%(title)s.%(ext)s\""

          if [ "$IS_AUDIO" = "true" ]; then
            echo "🎵 Persian Fix: Downloading high-quality Audio (MP3)..."
            yt-dlp $YT_OPTS -f "$FORMAT" --extract-audio --audio-format mp3 --audio-quality 0 "$URL"
          else
            echo "🎬 Persian Fix: Downloading Video..."
            yt-dlp $YT_OPTS -f "$FORMAT" --merge-output-format mp4 "$URL"
          fi

      - name: Commit & Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.OUTPUT_DIR }}
          git diff --cached --quiet || git commit -m "Added: Persian Ultra Fix YouTube Video"
          git push