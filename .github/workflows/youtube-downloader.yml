name: YouTube Downloader (Stable & Fast)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: false
        default: '1080p (FHD)'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p (FHD)
          - 720p (HD)
          - 480p (SD)
          - 360p
          - Audio Only (MP3)

env:
  OUTPUT_DIR: youtube

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # نصب Deno (برای JavaScript runtime مورد نیاز yt-dlp)
      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      # نصب yt-dlp از pip
      - name: Install yt-dlp
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "yt-dlp[default,curl-cffi]"

      # نصب سریع ffmpeg (کمتر از 10 ثانیه)
      - name: Install ffmpeg static
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz | tar xJ
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version | head -1

      # ذخیره کوکی از Secret
      - name: Save cookies.txt
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies file created (size: $(wc -c < cookies.txt) bytes)"
          else
            echo "⚠️ No YT_COOKIES secret. YouTube may block."
          fi

      # استخراج عنوان ویدیو (با استفاده مستقیم از yt-dlp)
      - name: Get video title
        id: title
        run: |
          URL="${{ github.event.inputs.video_url }}"
          SAFE_TITLE="youtube_$(date +%Y%m%d_%H%M%S)"
          RAW_TITLE=""

          # فراخوانی مستقیم yt-dlp با پشتیبانی از Deno
          YT_CMD="yt-dlp --js-runtimes deno --extractor-args youtube:player_client=android"
          if [ -f cookies.txt ]; then
            YT_CMD="$YT_CMD --cookies cookies.txt"
          fi

          TITLE=$($YT_CMD --get-title "$URL" 2>/dev/null) || TITLE=""
          if [ -n "$TITLE" ]; then
            RAW_TITLE="$TITLE"
            SAFE_TITLE=$(echo "$TITLE" | sed 's/[\\/:*?"<>|]/_/g' | tr -d '\n' | head -c 200)
            echo "✅ Title: $TITLE"
          else
            echo "⚠️ Could not fetch title, using fallback: $SAFE_TITLE"
          fi

          echo "safe_title=$SAFE_TITLE" >> $GITHUB_OUTPUT
          echo "raw_title=$RAW_TITLE" >> $GITHUB_OUTPUT

      # انتخاب فرمت بر اساس کیفیت
      - name: Prepare format options
        id: format
        run: |
          case "${{ github.event.inputs.quality }}" in
            "2160p (4K)")
              echo "format=bestvideo[height<=2160][ext=mp4]+bestaudio[ext=m4a]/best[height<=2160]" >> $GITHUB_OUTPUT
              echo "output_ext=mp4" >> $GITHUB_OUTPUT
              ;;
            "1440p (2K)")
              echo "format=bestvideo[height<=1440][ext=mp4]+bestaudio[ext=m4a]/best[height<=1440]" >> $GITHUB_OUTPUT
              echo "output_ext=mp4" >> $GITHUB_OUTPUT
              ;;
            "1080p (FHD)")
              echo "format=bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]" >> $GITHUB_OUTPUT
              echo "output_ext=mp4" >> $GITHUB_OUTPUT
              ;;
            "720p (HD)")
              echo "format=bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" >> $GITHUB_OUTPUT
              echo "output_ext=mp4" >> $GITHUB_OUTPUT
              ;;
            "480p (SD)")
              echo "format=bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]" >> $GITHUB_OUTPUT
              echo "output_ext=mp4" >> $GITHUB_OUTPUT
              ;;
            "360p")
              echo "format=bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360]" >> $GITHUB_OUTPUT
              echo "output_ext=mp4" >> $GITHUB_OUTPUT
              ;;
            "Audio Only (MP3)")
              echo "format=bestaudio" >> $GITHUB_OUTPUT
              echo "audio=true" >> $GITHUB_OUTPUT
              echo "output_ext=mp3" >> $GITHUB_OUTPUT
              ;;
          esac

      # دانلود ویدیو یا صدا
      - name: Download video/audio
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cd ${{ env.OUTPUT_DIR }}
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ steps.format.outputs.format }}"
          IS_AUDIO="${{ steps.format.outputs.audio }}"
          SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
          OUTPUT_EXT="${{ steps.format.outputs.output_ext }}"

          # ساختار پایه دستور yt-dlp با پشتیبانی از Deno
          YT_CMD="yt-dlp --js-runtimes deno --extractor-args youtube:player_client=android"
          if [ -f ../cookies.txt ]; then
            YT_CMD="$YT_CMD --cookies ../cookies.txt"
          fi

          COMMON_OPTS="--no-mtime --ignore-errors --retries 5 --fragment-retries 5 --sleep-interval 3 --max-sleep-interval 6 --limit-rate 2M --add-metadata --embed-thumbnail --embed-chapters --output \"$SAFE_TITLE.%(ext)s\""

          if [ "$IS_AUDIO" = "true" ]; then
            echo "🎵 Downloading audio only (MP3)..."
            eval $YT_CMD $COMMON_OPTS -f "$FORMAT" --extract-audio --audio-format mp3 --audio-quality 0 "$URL"
          else
            echo "🎬 Downloading video + audio (${OUTPUT_EXT^^})..."
            eval $YT_CMD $COMMON_OPTS -f "$FORMAT" --merge-output-format "$OUTPUT_EXT" "$URL"
          fi

          echo "✅ Download completed. Files in ${{ env.OUTPUT_DIR }}/"

      # کامیت و push به مخزن
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.OUTPUT_DIR }}
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add YouTube video: ${{ steps.title.outputs.raw_title || format('video-{0}', github.event.inputs.video_url) }}"
            git push
          fi