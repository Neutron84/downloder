name: YouTube Video Downloader (with Cookies)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: '1080p (FHD)'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p (FHD)
          - 720p (HD)
          - 480p (SD)
          - 360p
          - Audio Only (MP3)

env:
  OUTPUT_DIR: youtube

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Deno (JavaScript runtime for yt-dlp)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install yt-dlp via pip
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "yt-dlp[default]"

      - name: Install static ffmpeg (fast)
        run: |
          curl -L https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz | tar xJ
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version | head -1

      - name: Save cookies from secret
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies file created ($(wc -l < cookies.txt) lines)"
          else
            echo "⚠️ No YT_COOKIES secret. Download may fail."
          fi

      - name: Get video title
        id: title
        run: |
          URL="${{ github.event.inputs.video_url }}"
          
          # Command with cookies (if exists)
          if [ -f cookies.txt ]; then
            TITLE=$(yt-dlp --cookies cookies.txt --js-runtimes deno --extractor-args youtube:player_client=android --get-title "$URL" 2>/dev/null)
          else
            TITLE=""
          fi
          
          if [ -z "$TITLE" ]; then
            echo "⚠️ Could not fetch title, using fallback"
            TITLE="youtube_video_$(date +%Y%m%d_%H%M%S)"
          fi
          
          SAFE_TITLE=$(echo "$TITLE" | sed 's/[\\/:*?"<>|]/_/g' | tr -d '\n' | head -c 200)
          echo "safe_title=$SAFE_TITLE" >> $GITHUB_OUTPUT
          echo "raw_title=$TITLE" >> $GITHUB_OUTPUT

      - name: Prepare format selector
        id: format
        run: |
          case "${{ github.event.inputs.quality }}" in
            "2160p (4K)")
              echo "format=bestvideo[height<=2160]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "1440p (2K)")
              echo "format=bestvideo[height<=1440]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "1080p (FHD)")
              echo "format=bestvideo[height<=1080]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "720p (HD)")
              echo "format=bestvideo[height<=720]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "480p (SD)")
              echo "format=bestvideo[height<=480]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "360p")
              echo "format=bestvideo[height<=360]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "Audio Only (MP3)")
              echo "format=bestaudio" >> $GITHUB_OUTPUT
              echo "audio=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "format=bestvideo+bestaudio/best" >> $GITHUB_OUTPUT
          esac

      - name: Download video/audio
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cd ${{ env.OUTPUT_DIR }}
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ steps.format.outputs.format }}"
          IS_AUDIO="${{ steps.format.outputs.audio }}"
          SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
          
          # Base options
          YT_OPTS="--js-runtimes deno --extractor-args youtube:player_client=android --no-mtime --ignore-errors --retries 5 --fragment-retries 5 --sleep-interval 3 --max-sleep-interval 6 --limit-rate 2M --add-metadata --embed-thumbnail --embed-chapters --output \"$SAFE_TITLE.%(ext)s\""
          
          if [ -f ../cookies.txt ]; then
            YT_OPTS="$YT_OPTS --cookies ../cookies.txt"
          fi
          
          if [ "$IS_AUDIO" = "true" ]; then
            echo "🎵 Downloading audio only (MP3)..."
            yt-dlp $YT_OPTS -f "$FORMAT" --extract-audio --audio-format mp3 --audio-quality 0 "$URL"
          else
            echo "🎬 Downloading video..."
            yt-dlp $YT_OPTS -f "$FORMAT" --merge-output-format mp4 "$URL"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.OUTPUT_DIR }}
          git diff --cached --quiet || git commit -m "Downloaded: ${{ steps.title.outputs.raw_title }}"
          git push