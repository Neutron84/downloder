name: YouTube Downloader (Ultimate Fix)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: '1080p (FHD)'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p (FHD)
          - 720p (HD)
          - 480p (SD)
          - 360p
          - Audio Only (MP3)

env:
  OUTPUT_DIR: youtube

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yt-dlp and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --upgrade pip
          python3 -m pip install "yt-dlp[default]"

      - name: Setup Chrome and get cookies
        id: cookies
        run: |
          # Install Google Chrome
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          
          # Create virtual display for Chrome headless
          Xvfb :99 -screen 0 1280x1024x24 &
          export DISPLAY=:99
          
          # Run Chrome and navigate to YouTube, then export cookies
          google-chrome-stable --no-sandbox --disable-dev-shm-usage --headless --disable-gpu --remote-debugging-port=9222 https://www.youtube.com &
          sleep 5
          
          # Use yt-dlp to extract cookies from Chrome
          mkdir -p ~/.config/google-chrome
          python3 -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          import pickle
          
          chrome_options = Options()
          chrome_options.add_argument('--no-sandbox')
          chrome_options.add_argument('--disable-dev-shm-usage')
          chrome_options.add_argument('--headless')
          chrome_options.add_argument('--disable-gpu')
          chrome_options.add_argument('user-data-dir=/tmp/chrome-profile')
          
          driver = webdriver.Chrome(options=chrome_options)
          driver.get('https://www.youtube.com')
          # Wait for user to log in manually if needed (this is automated)
          import time
          time.sleep(10)
          pickle.dump(driver.get_cookies(), open('cookies.pkl', 'wb'))
          driver.quit()
          "
          
          # Convert cookies to Netscape format for yt-dlp
          python3 -c "
          import pickle
          cookies = pickle.load(open('cookies.pkl', 'rb'))
          with open('cookies.txt', 'w') as f:
              f.write('# Netscape HTTP Cookie File\n')
              for cookie in cookies:
                  f.write(f\"{cookie['domain']}\tTRUE\t{cookie['path']}\t{str(cookie.get('httpOnly', False)).upper()}\t{cookie.get('expiry', 0)}\t{cookie['name']}\t{cookie['value']}\n\")
          "

      - name: Get video title with cookies
        id: title
        run: |
          URL="${{ github.event.inputs.video_url }}"
          TITLE=$(yt-dlp --cookies cookies.txt --extractor-args "youtube:player_client=android" --get-title "$URL" 2>/dev/null)
          if [ -z "$TITLE" ]; then
            echo "Fallback: Could not fetch title"
            TITLE="youtube_video_$(date +%s)"
          fi
          SAFE_TITLE=$(echo "$TITLE" | sed 's/[\\/:*?"<>|]/_/g' | tr -d '\n' | head -c 200)
          echo "safe_title=$SAFE_TITLE" >> $GITHUB_OUTPUT
          echo "raw_title=$TITLE" >> $GITHUB_OUTPUT

      - name: Prepare format selector
        id: format
        run: |
          case "${{ github.event.inputs.quality }}" in
            "2160p (4K)")
              echo "format=bestvideo[height<=2160]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "1440p (2K)")
              echo "format=bestvideo[height<=1440]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "1080p (FHD)")
              echo "format=bestvideo[height<=1080]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "720p (HD)")
              echo "format=bestvideo[height<=720]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "480p (SD)")
              echo "format=bestvideo[height<=480]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "360p")
              echo "format=bestvideo[height<=360]+bestaudio/best" >> $GITHUB_OUTPUT
              ;;
            "Audio Only (MP3)")
              echo "format=bestaudio" >> $GITHUB_OUTPUT
              echo "audio=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "format=bestvideo+bestaudio/best" >> $GITHUB_OUTPUT
          esac

      - name: Download video/audio with cookies and PO Token
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          cd ${{ env.OUTPUT_DIR }}
          URL="${{ github.event.inputs.video_url }}"
          FORMAT="${{ steps.format.outputs.format }}"
          IS_AUDIO="${{ steps.format.outputs.audio }}"
          SAFE_TITLE="${{ steps.title.outputs.safe_title }}"
          
          YT_OPTS="--cookies ../cookies.txt --extractor-args \"youtube:player_client=android\" --no-mtime --ignore-errors --retries 10 --fragment-retries 10 --sleep-interval 5 --max-sleep-interval 10 --limit-rate 2M --add-metadata --embed-thumbnail --embed-chapters --output \"$SAFE_TITLE.%(ext)s\""
          
          if [ "$IS_AUDIO" = "true" ]; then
            echo "🎵 Downloading audio only (MP3)..."
            yt-dlp $YT_OPTS -f "$FORMAT" --extract-audio --audio-format mp3 --audio-quality 0 "$URL"
          else
            echo "🎬 Downloading video..."
            yt-dlp $YT_OPTS -f "$FORMAT" --merge-output-format mp4 "$URL"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.OUTPUT_DIR }}
          git diff --cached --quiet || git commit -m "Downloaded: ${{ steps.title.outputs.raw_title }}"
          git push