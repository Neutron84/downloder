name: Download with Cobalt API (without cookies and PO Token)


on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: false
        default: '1080p'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p
          - 720p
          - 480p
          - 360p
          - 144p
          - Audio Only

env:
  OUTPUT_DIR: Downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Making a request for the Cobalt API
        id: prepare
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          if [[ "$QUALITY" == "Audio Only" ]]; then
            PAYLOAD=$(jq -c -n \
              --arg url "${{ github.event.inputs.video_url }}" \
              '{url: $url, downloadMode: "audio", audioFormat: "mp3"}')
          else
            # Extract the quality number (e.g. 1080 from "1080p")
            QUALITY_NUM=$(echo "$QUALITY" | grep -oE '[0-9]+')
            PAYLOAD=$(jq -c -n \
              --arg url "${{ github.event.inputs.video_url }}" \
              --arg vq "$QUALITY_NUM" \
              '{url: $url, videoQuality: $vq}')
          fi
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Cobalt API call
        id: api
        run: |
          RESPONSE=$(curl -s -X POST "https://api.cobalt.tools/api/json" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '${{ steps.prepare.outputs.payload }}')
          
          echo "API response: $RESPONSE"
          
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [[ "$STATUS" == "error" ]]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error')
            echo "::error::Error from Cobalt: $ERROR_MSG"
            exit 1
          fi
          
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.url')
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Download the final file
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cd "${{ env.OUTPUT_DIR }}"
          curl -L -J -O "${{ steps.api.outputs.download_url }}"
          echo "List of downloaded files:"
          ls -lh

      - name: Commit and push to GitHub repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.OUTPUT_DIR }}"
          git diff --cached --quiet || git commit -m "Add downloaded video with Cobalt API"
          git push
