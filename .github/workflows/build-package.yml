name: Build Arch Package and Commit to Repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel sudo git wget jq
          # Create a non‑root builder for makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: /usr/bin/pacman" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Prepare dynamic PKGBUILD
        working-directory: ${{ github.workspace }}
        run: |
          cat > PKGBUILD <<'EOF'
          # Maintainer: Doug Newgard <scimmia at archlinux dot info>

          pkgname=pepper-flash
          pkgver=32.0.0.465
          pkgrel=1
          pkgdesc="Adobe's Pepper Flash plugin"
          arch=('i686' 'x86_64')
          url='https://get.adobe.com/flashplayer/'
          license=('custom')
          depends=('gcc-libs' 'glibc')
          optdepends=('flashplugin: Settings utility')
          conflicts=('chromium-pepper-flash')
          source_i686=("flash_player_ppapi_linux_${pkgver}.i386.tar.gz::https://fpdownload.adobe.com/get/flashplayer/pdc/${pkgver}/flash_player_ppapi_linux.i386.tar.gz")
          source_x86_64=("flash_player_ppapi_linux_${pkgver}.x86_64.tar.gz::https://fpdownload.adobe.com/get/flashplayer/pdc/${pkgver}/flash_player_ppapi_linux.x86_64.tar.gz")
          # Placeholder checksums – will be updated automatically
          sha256sums_i686=('SKIP')
          sha256sums_x86_64=('SKIP')

          package() {
            install -Dm644 manifest.json libpepflashplayer.so -t "$pkgdir/usr/lib/PepperFlash/"
            install -Dm644 license.pdf -t "$pkgdir/usr/share/licenses/$pkgname/"
          }
          EOF

      - name: Download latest stable version from AUR and update PKGBUILD
        working-directory: ${{ github.workspace }}
        run: |
          # Fetch the latest stable version and source info from the AUR git repo
          git clone https://aur.archlinux.org/pepper-flash.git /tmp/pepper-flash-aur
          # Copy the PKGBUILD (with correct checksums) from AUR
          cp /tmp/pepper-flash-aur/PKGBUILD .
          # Ensure source URLs point to the correct Adobe servers (AUR already does)
          # Replace placeholder pkgver with actual version from AUR (if needed)
          # But normally the AUR PKGBUILD already has the right version+checksum.
          # However, if you still want to compute fresh checksums:
          # makepkg --verifysource -g >> PKGBUILD
          # But that would require the sources to be present.
          echo "PKGBUILD from AUR has been placed in the working directory."

      - name: Build the package
        working-directory: ${{ github.workspace }}
        run: |
          chown -R builder:builder .
          sudo -u builder bash << 'EOF'
          set -e
          # Update checksums automatically (this will replace 'SKIP' with real ones)
          updpkgsums
          # Now build the package
          makepkg -s --noconfirm
          EOF
        env:
          PACKAGER: "GitHub Actions <actions@github.com>"

      - name: Find generated package file
        id: find_pkg
        working-directory: ${{ github.workspace }}
        run: |
          PKG_FILE=$(find . -maxdepth 1 -name "*.pkg.tar.zst" -type f | head -n1)
          if [ -z "$PKG_FILE" ]; then
            echo "No package file found!"
            exit 1
          fi
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "Found: $PKG_FILE"

      - name: Move package to repository root
        run: |
          # Remove old package files from repo root
          rm -f $GITHUB_WORKSPACE/*.pkg.tar.zst
          # Move the freshly built package
          mv "${{ steps.find_pkg.outputs.pkg_file }}" $GITHUB_WORKSPACE/

      - name: Commit and push the package file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pkg.tar.zst
          git diff --cached --quiet || git commit -m "Update Arch package built from PKGBUILD (${GITHUB_SHA:0:7})"
          git push origin HEAD:${GITHUB_REF_NAME}