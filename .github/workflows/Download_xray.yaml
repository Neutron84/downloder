name: Download xray Linux ZIP

on:
  workflow_dispatch: 

permissions:
  contents: write    

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download Xray-linux-64.zip
        run: |
          curl -L -o Xray-linux-64.zip \
          https://github.com/XTLS/Xray-core/releases/download/v26.5.9/Xray-linux-64.zip

      - name: Commit and push if file changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Xray-linux-64.zip
          git diff --cached --quiet || git commit -m "Download Xray-linux-64.zip v26.5.9"
          git push
