name: Build UABEA fully (offline-ready)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository (for storing zip output)
        uses: actions/checkout@v4

      - name: Install .NET SDK 6.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Clone AUR package (uabea) source
        run: |
          git clone --branch v8 https://github.com/nesrak1/UABEA uabea

      - name: Apply patch (from your AUR folder)
        run: |
          # اگر فایل پچ در ریپازیتوری شما هست، آن را کپی کنید
          cp 0001-Fix-config-path.patch uabea/ || true
          cd uabea
          git apply 0001-Fix-config-path.patch || echo "Patch may already applied"

      - name: Remove Windows-specific project
        run: |
          cd uabea
          dotnet sln UABEAvalonia.sln remove TexToolWrap/TexToolWrap.vcxproj || true

      - name: Restore dependencies (online - will work in GitHub)
        run: |
          cd uabea
          dotnet restore

      - name: Build Release
        run: |
          cd uabea
          dotnet build --configuration Release --no-restore

      - name: Copy native libonigwrap.so to linux-x64
        run: |
          cd uabea
          mkdir -p UABEAvalonia/bin/Release/net6.0/runtimes/linux-x64/native
          cp UABEAvalonia/bin/Release/net6.0/runtimes/linux/native/libonigwrap.so \
             UABEAvalonia/bin/Release/net6.0/runtimes/linux-x64/native/ 2>/dev/null || echo "libonigwrap already there?"

      - name: Remove unnecessary runtimes (keep only linux-x64)
        run: |
          cd uabea/UABEAvalonia/bin/Release/net6.0/runtimes
          find . -maxdepth 1 ! -name linux-x64 -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Prepare offline package (entire build output + dependencies)
        run: |
          mkdir -p uabea_offline_package
          # کپی کل خروجی بیلد (شامل همه dll های وابسته)
          cp -r uabea/UABEAvalonia/bin/Release/net6.0/* uabea_offline_package/
          # همچنین برای اطمینان، کل پوشه بیلد را زیپ می‌کنیم
          cd uabea
          zip -r ../uabea_offline_package/UABEA_build.zip UABEAvalonia/bin/Release/net6.0/
          cd ..
          # می‌توانید فایل executable را به راحتی در دسترس قرار دهید
          cp uabea/UABEAvalonia/bin/Release/net6.0/UABEAvalonia uabea_offline_package/

      - name: Create final ZIP (ready to run on your system)
        run: |
          zip -r uabea_complete_offline.zip uabea_offline_package/

      - name: Commit and push ZIP file to your repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uabea_complete_offline.zip
          git diff --cached --quiet || git commit -m "Add complete offline build of UABEA (net6.0)"
          git push
