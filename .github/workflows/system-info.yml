name: Collect System Information

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools on Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap procps
          sudo add-apt-repository ppa:zhangsongcui3371/fastfetch -y
          sudo apt-get update
          sudo apt-get install -y fastfetch

      - name: Gather system information
        run: |
          mkdir -p reports
         
          echo "# System Report - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > reports/system-info.txt
          pwd >>  reports/fastfetch.txt 2>/dev/null
          echo "## fastfetch output" >> reports/system-info.txt
          fastfetch --pipe --format json > reports/fastfetch.json 2>/dev/null || fastfetch > reports/fastfetch.txt 2>/dev/null
          echo -e "\n## CPU Info (lscpu)" >> reports/system-info.txt
          lscpu >> reports/system-info.txt
          echo -e "\n## Memory Info" >> reports/system-info.txt
          free -h >> reports/system-info.txt
          echo -e "\n## Network Interfaces" >> reports/system-info.txt
          ip addr show >> reports/system-info.txt 2>/dev/null || echo "ip command not available" >> reports/system-info.txt
          echo -e "\n## Nmap localhost scan" >> reports/system-info.txt
          nmap -v -T4 -sS -sV localhost >> reports/system-info.txt 2>&1 || echo "nmap failed" >> reports/system-info.txt
        continue-on-error: true

      - name: Advanced network info
        run: |
            echo "=== Open ports on localhost ===" > reports/net.txt
            ss -tuln >> reports/net.txt
            echo "=== iptables rules (if any) ===" >> reports/net.txt
            sudo iptables -L -n || echo "iptables not accessible" >> reports/net.txt
            echo "=== TCP connect scan with nmap (no root) ===" >> reports/net.txt
            nmap -sT -p- localhost || echo "nmap failed" >> reports/net.txt
            echo "=== Routing table ===" >> reports/net.txt
            ip route show >> reports/net.txt
            echo "=== DNS config ===" >> reports/net.txt
            cat /etc/resolv.conf >> reports/net.txt


      - name: Create final ZIP
        run: |
            zip -r systeminfo.zip reports/


      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add systeminfo.zip
          git diff --cached --quiet || git commit -m "Add system information report [skip ci]"
          git push