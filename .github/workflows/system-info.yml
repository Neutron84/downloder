name: Collect System Information

on:
  workflow_dispatch:  
permissions:
  contents: write  

jobs:
  collect-info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools on Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y fastfetch lscpu nmap procps

      - name: Gather system information
        run: |
          mkdir -p reports
          echo "# System Report - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > reports/system-info.txt
          echo "## Basic System Info" >> reports/system-info.txt
          fastfetch --pipe --format json > reports/fastfetch.json 2>/dev/null || fastfetch > reports/fastfetch.txt 2>/dev/null || echo "fastfetch failed" >> reports/system-info.txt
          echo -e "\n## CPU Information" >> reports/system-info.txt
          lscpu >> reports/system-info.txt
          echo -e "\n## Memory Information" >> reports/system-info.txt
          free -h >> reports/system-info.txt
          echo -e "\n## Network Interfaces" >> reports/system-info.txt
          ip addr show >> reports/system-info.txt 2>/dev/null || echo "ip command not available" >> reports/system-info.txt
          echo -e "\n## Nmap localhost scan" >> reports/system-info.txt
          nmap -v -T4 -sS -sV -O localhost >> reports/system-info.txt 2>&1 || echo "nmap failed" >> reports/system-info.txt
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Add system information report [skip ci]"
          git push