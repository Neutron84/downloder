name: دانلود با Cobalt API شخصی (نسخه پایدار)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی یوتیوب'
        required: true
        type: string
      quality:
        description: 'کیفیت'
        required: false
        default: '1080p'
        type: choice
        options:
          - 2160p (4K)
          - 1440p (2K)
          - 1080p
          - 720p
          - 480p
          - 360p
          - Audio Only

env:
  OUTPUT_DIR: downloads

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies (jq, curl)
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Run Cobalt API container with correct settings
        run: |
          docker run -d --name cobalt-api \
            -p 9000:9000 \
            -e API_URL=http://0.0.0.0:9000 \
            ghcr.io/imputnet/cobalt:10
          echo "✅ Container started, waiting for service..."
          # Wait and check logs
          sleep 5
          docker logs cobalt-api
          # Test if API is reachable (simple GET to root might return 404 but connection is ok)
          for i in {1..15}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:9000/api/json | grep -q "200\|404\|400"; then
              echo "✅ Cobalt API is responding"
              break
            fi
            echo "⏳ Waiting for API to be ready... ($i/15)"
            sleep 3
          done

      - name: Prepare JSON request based on quality
        id: prepare
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          if [[ "$QUALITY" == "Audio Only" ]]; then
            PAYLOAD=$(jq -c -n \
              --arg url "${{ github.event.inputs.video_url }}" \
              '{url: $url, downloadMode: "audio", audioFormat: "mp3"}')
          else
            QUALITY_NUM=$(echo "$QUALITY" | grep -oE '[0-9]+')
            if [[ -z "$QUALITY_NUM" ]]; then
              QUALITY_NUM="1080"
            fi
            PAYLOAD=$(jq -c -n \
              --arg url "${{ github.event.inputs.video_url }}" \
              --arg vq "$QUALITY_NUM" \
              '{url: $url, videoQuality: $vq}')
          fi
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT
          echo "Request payload: $PAYLOAD"

      - name: Call Cobalt API (self-hosted)
        id: api
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:9000/api/json \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '${{ steps.prepare.outputs.payload }}')
          
          echo "API response: $RESPONSE"
          
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [[ "$STATUS" == "error" ]]; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error')
            echo "::error::Cobalt API error: $ERROR_MSG"
            exit 1
          fi
          
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.url')
          FILENAME=$(echo "$RESPONSE" | jq -r '.filename')
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Download final file
        run: |
          mkdir -p "${{ env.OUTPUT_DIR }}"
          cd "${{ env.OUTPUT_DIR }}"
          echo "Downloading from: ${{ steps.api.outputs.download_url }}"
          curl -L -J -O "${{ steps.api.outputs.download_url }}"
          echo "Downloaded files:"
          ls -lh

      - name: Stop container (cleanup)
        if: always()
        run: docker stop cobalt-api || true

      - name: Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.OUTPUT_DIR }}"
          git diff --cached --quiet || git commit -m "Add downloaded video via self-hosted Cobalt"
          git push
