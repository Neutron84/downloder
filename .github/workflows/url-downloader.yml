name: 0-Fetch Any URL as Offline HTML (SingleFile)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
      filename:
        description: 'Output filename (default: page)'
        required: false
        default: 'page'

permissions:
  contents: write

jobs:
  fetch-offline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SingleFile CLI and dependencies
        run: npm install -g single-file-cli

      - name: Download and save page as offline HTML (with guaranteed images)
        run: |
          mkdir -p fetched_data
          single-file "${{ github.event.inputs.url }}" "fetched_data/${{ github.event.inputs.filename }}.html" \
            --browser-wait-until=networkIdle0 \
            --browser-wait-delay=5000 \
            --load-deferred-images=true \
            --remove-alternative-images=false

      - name: Compress result (optional)
        run: tar czf fetched_content.tar.gz fetched_data/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fetched_content.tar.gz fetched_data/
          git diff --cached --quiet || git commit -m "Offline snapshot of ${{ github.event.inputs.url }} (fixed images)"
          git push