name: Crawl Dynamic Website with Depth and Scroll

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Starting URL'
        required: true
        type: string
      crawl_depth:
        description: 'Crawl depth (0 = only start page, 1 = start + linked pages, etc.)'
        required: false
        default: '0'
        type: string
      scroll_limit:
        description: 'Number of scrolls per page (for infinite scroll)'
        required: false
        default: '15'
        type: string
      scroll_pause_ms:
        description: 'Pause between scrolls (milliseconds)'
        required: false
        default: '2000'
        type: string
      wait_for_selector:
        description: 'CSS selector to wait for before scrolling (optional)'
        required: false
        default: ''
        type: string
      output_dir:
        description: 'Output directory (must end with /) e.g., output/'
        required: true
        default: 'output/'
        type: string
      cookies_file:
        description: 'Path to cookies file (Netscape .txt or JSON) inside repo'
        required: false
        default: ''
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate output directory
        run: |
          if [[ ! "${{ github.event.inputs.output_dir }}" =~ /$ ]]; then
            echo "::error::Output directory must end with /"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer, cheerio and Chromium
        run: |
          npm install puppeteer cheerio
          sudo apt-get update
          sudo apt-get install -y chromium
          sudo ln -sf /usr/bin/chromium /usr/bin/chromium-browser

      - name: Create output directory
        run: mkdir -p "${{ github.event.inputs.output_dir }}"

      - name: Run Puppeteer depth crawler
        env:
          TARGET_URL: ${{ github.event.inputs.url }}
          CRAWL_DEPTH: ${{ github.event.inputs.crawl_depth }}
          SCROLL_LIMIT: ${{ github.event.inputs.scroll_limit }}
          SCROLL_PAUSE_MS: ${{ github.event.inputs.scroll_pause_ms }}
          WAIT_SELECTOR: ${{ github.event.inputs.wait_for_selector }}
          OUTPUT_DIR: ${{ github.event.inputs.output_dir }}
          COOKIES_FILE: ${{ github.event.inputs.cookies_file }}
        run: |
          node << 'EOF'
          const puppeteer = require('puppeteer');
          const cheerio = require('cheerio');
          const fs = require('fs').promises;
          const path = require('path');
          const { exec } = require('child_process');
          const { promisify } = require('util');
          const crypto = require('crypto');
          const execPromise = promisify(exec);

          // Helper: parse srcset string into array of URLs
          function parseSrcset(srcset) {
            if (!srcset) return [];
            return srcset.split(',').map(part => {
              const trimmed = part.trim();
              const urlPart = trimmed.split(/\s+/)[0];
              return urlPart;
            }).filter(u => u);
          }

          // Helper: remove query string and fragment for matching assets (resources)
          function normalizeUrlForMatch(url) {
            try {
              const u = new URL(url);
              return u.origin + u.pathname;
            } catch (e) {
              return url.split('?')[0].split('#')[0];
            }
          }

          // Helper: remove only fragment for visited pages (to avoid duplicate entries)
          function normalizeUrlForVisited(url) {
            try {
              const u = new URL(url);
              u.hash = '';
              return u.href;
            } catch (e) {
              return url.split('#')[0];
            }
          }

          // Helper: resolve relative URL
          function resolveUrl(base, relative) {
            try {
              return new URL(relative, base).href;
            } catch (e) {
              return relative;
            }
          }

          (async () => {
            const startUrl = process.env.TARGET_URL;
            const maxDepth = parseInt(process.env.CRAWL_DEPTH, 10) || 1;
            const scrollLimit = parseInt(process.env.SCROLL_LIMIT, 10) || 15;
            const scrollPauseMs = parseInt(process.env.SCROLL_PAUSE_MS, 10) || 2000;
            const waitSelector = process.env.WAIT_SELECTOR || '';
            const outDir = process.env.OUTPUT_DIR;
            const cookiesFilePath = process.env.COOKIES_FILE;

            const browser = await puppeteer.launch({
              headless: true,
              executablePath: '/usr/bin/chromium',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-accelerated-2d-canvas',
                '--disable-gpu'
              ]
            });

            const resourceMap = new Map(); // normalizedUrl -> {body, contentType, originalUrl}
            const visited = new Set();      // stores normalized visited URLs (without fragment)
            const queue = [{ url: startUrl, depth: 0 }];
            const pageMap = new Map();      // final normalized URL -> local html file name
            let firstPageLocalFile = null;  // for index.html redirect

            async function processPage(pageUrl, currentDepth) {
              const page = await browser.newPage();
              await page.setUserAgent('Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
              await page.setViewport({ width: 1280, height: 800 });
              // Set default navigation timeout to 2 minutes
              await page.setDefaultNavigationTimeout(120000);

              let pendingResources = [];

              await page.setRequestInterception(true);
              page.on('request', req => req.continue());

              page.on('response', async response => {
                const respUrl = response.url();
                const contentType = response.headers()['content-type'] || '';
                const ext = path.extname(new URL(respUrl).pathname).toLowerCase();
                const isHtml = contentType.includes('text/html') || ext === '.html' || ext === '.htm';
                // skip redirects (3xx) because buffer() will fail
                if (!isHtml && (response.status() < 300 || response.status() >= 400)) {
                  const normalized = normalizeUrlForMatch(respUrl);
                  const bufferPromise = response.buffer().catch(err => {
                    console.warn(`Buffer error for ${respUrl}: ${err.message}`);
                    return null;
                  });
                  const p = bufferPromise.then(buffer => {
                    if (buffer && !resourceMap.has(normalized)) {
                      resourceMap.set(normalized, { body: buffer, contentType, originalUrl: respUrl });
                    }
                    return true;
                  }).catch(err => console.warn(`Failed to capture ${respUrl}: ${err.message}`));
                  pendingResources.push(p);
                }
              });

              // Set cookies if provided
              if (cookiesFilePath && cookiesFilePath.trim() !== '') {
                try {
                  const cookiesContent = await fs.readFile(cookiesFilePath, 'utf8');
                  let cookies;
                  if (cookiesFilePath.endsWith('.json')) {
                    cookies = JSON.parse(cookiesContent);
                  } else {
                    cookies = cookiesContent.split('\n')
                      .filter(line => line.trim() && !line.startsWith('#'))
                      .map(line => {
                        const parts = line.split(/\s+/);
                        return {
                          name: parts[5],
                          value: parts[6],
                          domain: parts[0],
                          path: parts[2],
                          expires: parseInt(parts[4], 10),
                          httpOnly: parts[3].includes('HttpOnly'),
                          secure: parts[3].includes('Secure')
                        };
                      });
                  }
                  await page.setCookie(...cookies);
                } catch (err) {
                  console.warn('Cookie error:', err.message);
                }
              }

              // Navigation with try-catch to handle timeouts gracefully
              let finalUrlRaw;
              try {
                await page.goto(pageUrl, { waitUntil: 'networkidle2', timeout: 120000 });
                finalUrlRaw = page.url();
              } catch (navErr) {
                console.warn(`Navigation failed for ${pageUrl}: ${navErr.message}. Skipping this page.`);
                await page.close();
                return null;
              }

              const finalUrl = normalizeUrlForVisited(finalUrlRaw);

              if (visited.has(finalUrl)) {
                await page.close();
                return null;
              }
              visited.add(finalUrl);
              console.log(`[Depth ${currentDepth}] Processing: ${finalUrl}`);

              if (waitSelector) {
                await page.waitForSelector(waitSelector, { timeout: 10000 }).catch(() => {});
              }

              // Scroll handling
              let previousHeight = await page.evaluate('document.body.scrollHeight');
              for (let i = 0; i < scrollLimit; i++) {
                await page.evaluate('window.scrollTo(0, document.body.scrollHeight)');
                await page.waitForFunction(
                  `document.body.scrollHeight > ${previousHeight}`,
                  { timeout: 5000 }
                ).catch(() => console.log(`Scroll ${i+1}: no new content`));
                await new Promise(r => setTimeout(r, scrollPauseMs));
                const newHeight = await page.evaluate('document.body.scrollHeight');
                if (newHeight === previousHeight) break;
                previousHeight = newHeight;
              }

              await page.waitForNetworkIdle({ idleTime: 2000, timeout: 15000 }).catch(() => {});
              await Promise.all(pendingResources);
              pendingResources = [];

              // Extract CSS URLs from stylesheets
              const cssUrls = await page.evaluate(() => {
                const urls = new Set();
                document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                  if (link.href) urls.add(link.href);
                });
                document.querySelectorAll('style').forEach(style => {
                  const text = style.textContent;
                  if (text) {
                    const matches = text.match(/url\([\'"]?([^\'")]+)[\'"]?\)/g);
                    if (matches) {
                      matches.forEach(m => {
                        const u = m.replace(/url\([\'"]?/, '').replace(/[\'"]?\)/, '');
                        if (u && !u.startsWith('data:')) urls.add(u);
                      });
                    }
                  }
                });
                return Array.from(urls);
              });

              // Fetch missing CSS resources
              for (const cssUrl of cssUrls) {
                try {
                  const absolute = new URL(cssUrl, finalUrlRaw).href;
                  const normalized = normalizeUrlForMatch(absolute);
                  if (!resourceMap.has(normalized)) {
                    await page.evaluate(async (url) => {
                      await fetch(url, { mode: 'no-cors' });
                    }, absolute).catch(() => {});
                  }
                } catch(e) {}
              }
              await new Promise(r => setTimeout(r, 1000));
              await Promise.all(pendingResources);
              pendingResources = [];

              const html = await page.content();
              const links = await page.evaluate(() => {
                const anchors = Array.from(document.querySelectorAll('a[href]'));
                return anchors
                  .map(a => a.href)
                  .filter(href => href && !href.startsWith('mailto:') && !href.startsWith('javascript:') && !href.includes('#'));
              });

              await page.close();

              const urlHash = crypto.createHash('md5').update(finalUrl).digest('hex').slice(0, 12);
              const localFileName = `page_${urlHash}.html`;
              pageMap.set(finalUrl, localFileName);
              return { html, links, localFileName, finalUrl };
            }

            const pagesData = [];
            let idx = 0;
            while (idx < queue.length) {
              const { url: currentUrl, depth } = queue[idx];
              idx++;
              if (depth > maxDepth) continue;

              // Normalize the current URL before processing to avoid duplicates
              const normalizedCurrent = normalizeUrlForVisited(currentUrl);
              if (visited.has(normalizedCurrent)) continue;

              const result = await processPage(currentUrl, depth);
              if (result) {
                if (!firstPageLocalFile) {
                  firstPageLocalFile = result.localFileName;
                }
                pagesData.push({
                  url: result.finalUrl,
                  html: result.html,
                  localFile: result.localFileName,
                  depth: depth,
                  links: result.links
                });
                if (depth < maxDepth) {
                  const baseDomain = new URL(startUrl).hostname;
                  for (const link of result.links) {
                    try {
                      const linkUrl = new URL(link);
                      if (linkUrl.hostname === baseDomain) {
                        const normalizedLink = normalizeUrlForVisited(linkUrl.href);
                        if (!visited.has(normalizedLink) && !queue.some(item => normalizeUrlForVisited(item.url) === normalizedLink)) {
                          queue.push({ url: linkUrl.href, depth: depth + 1 });
                        }
                      }
                    } catch (e) {}
                  }
                }
              }
            }

            // Create temporary directory and save assets
            const tempDir = path.join(outDir, 'temp_crawl_' + Date.now());
            const assetsDir = path.join(tempDir, 'assets');
            await fs.mkdir(assetsDir, { recursive: true });

            const urlToAssetPath = new Map(); // normalizedUrl -> relative path
            for (const [normUrl, data] of resourceMap.entries()) {
              let ext = '';
              const contentType = data.contentType;
              if (contentType.includes('css')) ext = '.css';
              else if (contentType.includes('javascript')) ext = '.js';
              else if (contentType.includes('image/png')) ext = '.png';
              else if (contentType.includes('image/jpeg')) ext = '.jpg';
              else if (contentType.includes('image/gif')) ext = '.gif';
              else if (contentType.includes('image/webp')) ext = '.webp';
              else if (contentType.includes('image/svg')) ext = '.svg';
              else if (contentType.includes('image/avif')) ext = '.avif';
              else if (contentType.includes('image/heic')) ext = '.heic';
              else if (contentType.includes('image/bmp')) ext = '.bmp';
              else if (contentType.includes('image/tiff')) ext = '.tiff';
              else if (contentType.includes('font/woff2')) ext = '.woff2';
              else if (contentType.includes('font/woff')) ext = '.woff';
              else {
                const parsed = new URL(data.originalUrl || normUrl);
                const parsedExt = path.extname(parsed.pathname);
                ext = parsedExt || '.bin';
              }
              const hash = crypto.createHash('md5').update(normUrl).digest('hex').slice(0, 12);
              const assetFileName = `${hash}${ext}`;
              const assetRelPath = path.join('assets', assetFileName);
              const fullAssetPath = path.join(tempDir, assetRelPath);
              await fs.writeFile(fullAssetPath, data.body);
              urlToAssetPath.set(normUrl, assetRelPath);
            }

            // Rewrite HTML files
            for (const pageInfo of pagesData) {
              const $ = cheerio.load(pageInfo.html);
              const pageBase = pageInfo.url;

              const attributesToCheck = [
                { selector: 'img', attr: 'src' },
                { selector: 'img', attr: 'srcset', isSrcset: true },
                { selector: 'source', attr: 'srcset', isSrcset: true },
                { selector: 'link', attr: 'href' },
                { selector: 'script', attr: 'src' },
                { selector: 'video', attr: 'src' },
                { selector: 'audio', attr: 'src' },
                { selector: 'object', attr: 'data' },
                { selector: 'embed', attr: 'src' },
                { selector: 'iframe', attr: 'src' }
              ];

              for (const { selector, attr, isSrcset } of attributesToCheck) {
                $(selector).each((i, el) => {
                  let val = $(el).attr(attr);
                  if (!val) return;
                  if (isSrcset) {
                    const urls = parseSrcset(val);
                    let newSrcset = val;
                    for (const url of urls) {
                      const absolute = resolveUrl(pageBase, url);
                      const normalized = normalizeUrlForMatch(absolute);
                      if (urlToAssetPath.has(normalized)) {
                        newSrcset = newSrcset.replace(url, urlToAssetPath.get(normalized));
                      }
                    }
                    if (newSrcset !== val) $(el).attr(attr, newSrcset);
                  } else {
                    const absolute = resolveUrl(pageBase, val);
                    const normalized = normalizeUrlForMatch(absolute);
                    if (urlToAssetPath.has(normalized)) {
                      $(el).attr(attr, urlToAssetPath.get(normalized));
                    }
                  }
                });
              }

              // Inline style handling
              $('[style]').each((i, el) => {
                let style = $(el).attr('style');
                if (style) {
                  const urlMatches = style.match(/url\([\'"]?([^\'")]+)[\'"]?\)/g);
                  if (urlMatches) {
                    for (const match of urlMatches) {
                      const urlPart = match.replace(/url\([\'"]?/, '').replace(/[\'"]?\)/, '');
                      const absolute = resolveUrl(pageBase, urlPart);
                      const normalized = normalizeUrlForMatch(absolute);
                      if (urlToAssetPath.has(normalized)) {
                        const newMatch = `url("${urlToAssetPath.get(normalized)}")`;
                        style = style.replace(match, newMatch);
                      }
                    }
                    $(el).attr('style', style);
                  }
                }
              });

              // Inter-page links
              for (const [targetUrl, targetLocalFile] of pageMap.entries()) {
                if (targetUrl !== pageInfo.url) {
                  $('a[href]').each((i, el) => {
                    let href = $(el).attr('href');
                    if (href) {
                      const absolute = resolveUrl(pageBase, href);
                      const normalizedTarget = normalizeUrlForVisited(absolute);
                      if (normalizedTarget === targetUrl) {
                        $(el).attr('href', targetLocalFile);
                      }
                    }
                  });
                }
              }

              const updatedHtml = $.html();
              const htmlFilePath = path.join(tempDir, pageInfo.localFile);
              await fs.writeFile(htmlFilePath, updatedHtml);
            }

            if (firstPageLocalFile) {
              await fs.writeFile(path.join(tempDir, 'index.html'), `<meta http-equiv="refresh" content="0; url=${firstPageLocalFile}">`);
            }

            const timestamp = new Date().toISOString().replace(/[-:]/g, '').slice(0, 15);
            const domain = new URL(startUrl).hostname;
            const archiveName = `${domain}_depth${maxDepth}_${timestamp}.tar.gz`;
            const archivePath = path.join(outDir, archiveName);
            await execPromise(`tar -czf "${archivePath}" -C "${tempDir}" .`);
            console.log(`Archive created: ${archivePath}`);

            await fs.rm(tempDir, { recursive: true, force: true });
            await browser.close();
          })();
          EOF

      - name: Commit and push output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${{ github.event.inputs.output_dir }}"
          git commit -m "Add depth crawl snapshot: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push